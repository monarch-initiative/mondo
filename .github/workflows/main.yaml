# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  # push:
  #  branches: [ master ]
  pull_request:
    branches: [ master ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "ontology_qc"
  ontology_qc:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Normalize mondo-edit.obo
        run: |
          cd src/ontology
          make NORM && mv NORM mondo-edit.obo

      - name: Fail if mondo-edit.obo is not normalized
        run: |
          cd src/ontology
          if ! git diff --quiet -- mondo-edit.obo; then
            echo "::error file=src/ontology/mondo-edit.obo::mondo-edit.obo is not normalized. Comment /normalize-mondo-edit to run normalization, or run make NORM && mv NORM mondo-edit.obo yourself and commit the changes."
            git --no-pager diff -- mondo-edit.obo
            exit 1
          fi

      - name: Run ontology QC checks
        env:
          DEFAULT_BRANCH: master
        run: |
          cd src/ontology
          make GITHUB_ACTION=true IMP=false PAT=false test -B

