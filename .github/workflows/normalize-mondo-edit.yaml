name: Normalize mondo-edit.obo

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PR_BRANCH: ${{ github.event.pull_request.head.ref }}
  PR_REPO: ${{ github.event.pull_request.head.repo.full_name }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}

jobs:
  normalize_mondo_edit:
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ${{ env.PR_REPO }}
          ref: ${{ env.PR_BRANCH }}
          fetch-depth: 1

      - name: Configure git
        if: ${{ env.SAME_REPO == 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Normalize PR file
        run: |
          cd src/ontology
          make NORM && mv NORM mondo-edit.obo

      - name: Commit and push if changed
        id: push
        run: |
          if git diff --quiet -- src/ontology/mondo-edit.obo; then
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          elif [ "$SAME_REPO" = "true" ]; then
            git add src/ontology/mondo-edit.obo
            git commit -m "Normalize mondo-edit.obo"
            git push origin "HEAD:${PR_BRANCH}"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          else
            echo "::error file=src/ontology/mondo-edit.obo::mondo-edit.obo is not normalized. Fork PRs cannot be auto-normalized; please run 'make NORM && mv NORM mondo-edit.obo' and commit the result."
            git --no-pager diff -- src/ontology/mondo-edit.obo
            exit 1
          fi

      # This uses `gh api` to trigger QC, rather than a reusable workflow
      # with `needs:` because we want to be explicit about which ref to
      # trigger it on. If normalization occurred, it will be run on the
      # normalization commit. Otherwise, it will be run on the original commit
      # that triggered this workflow.
      - name: Trigger QC on HEAD ref
        if: ${{ env.SAME_REPO == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/qc.yaml/dispatches" \
            -f "ref=${PR_BRANCH}" \
            -f "inputs[sha]=${{ steps.push.outputs.sha }}" \
            -f "inputs[pr_number]=${PR_NUMBER}"
