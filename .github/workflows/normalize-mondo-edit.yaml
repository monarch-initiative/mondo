name: Normalize mondo-edit.obo

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PR_BRANCH: ${{ github.event.pull_request.head.ref }}
  PR_NUMBER: ${{ github.event.pull_request.number }}

jobs:
  normalize_mondo_edit:
    # Only run on PRs opened from a branch in this repo. Fork PRs are
    # handled by `fork-pull-orchestrator.yaml`.
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    container: obolibrary/odkfull:v1.6
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.PR_BRANCH }}
          fetch-depth: 1

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Normalize PR file
        run: |
          cd src/ontology
          make NORM && mv NORM mondo-edit.obo

      - name: Commit and push if changed
        id: push
        run: |
          if ! git diff --quiet -- src/ontology/mondo-edit.obo; then
            git add src/ontology/mondo-edit.obo
            git commit -m "Normalize mondo-edit.obo"
            git push origin "HEAD:${PR_BRANCH}"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Trigger QC on normalized branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/qc.yaml/dispatches" \
            -f "ref=${PR_BRANCH}" \
            -f "inputs[sha]=${{ steps.push.outputs.sha }}" \
            -f "inputs[pr_number]=${PR_NUMBER}"
