name: PR orchestrator

on:
  pull_request:
    branches: [ master ]

concurrency:
  # Only allow one run at a time for any PR
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  normalize_mondo_edit:
    uses: ./.github/workflows/normalize-mondo-edit.yaml
    permissions:
      contents: write
    with:
      pr_branch: ${{ github.event.pull_request.head.ref }}
      same_repo: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    secrets: inherit

  ontology_qc:
    needs: normalize_mondo_edit
    if: needs.normalize_mondo_edit.outputs.pushed != 'true'
    uses: ./.github/workflows/qc.yaml
    permissions:
      contents: read
    secrets: inherit
